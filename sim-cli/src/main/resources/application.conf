netgamesim {
  topology = "complete"
  numNodes = 10
  edgeProbability = 0.3
  seed = 42
}

sim {
  algorithm = "bully"
  runDurationMs = 10000

  messages {
    types = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }

  edgeLabeling {
    default = ["CONTROL", "PING"]
    overrides = []
  }

  traffic {
    defaultPdf = [
      { msg = "PING", p = 0.50 },
      { msg = "GOSSIP", p = 0.30 },
      { msg = "WORK", p = 0.20 }
    ]
    perNodePdf = []
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 200, mode = "pdf" }
    ]
    inputs = [
      { node = 1 },
      { node = 2 }
    ]
  }
}

akka {
  loglevel = "INFO"
  actor {
    default-dispatcher {
      throughput = 10
    }
  }
}
