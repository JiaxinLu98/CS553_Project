sim {
  algorithm = "bully"
  runDurationMs = 5000

  graph {
    topology = "complete"
    numNodes = 5
    edgeProbability = 0.3
    seed = 42
  }

  messages {
    types = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }

  edgeLabeling {
    default = ["CONTROL", "PING"]
    overrides = []
  }

  traffic {
    tickIntervalMs = 200
    defaultPdf = [
      { msg = "PING", p = 0.50 },
      { msg = "GOSSIP", p = 0.30 },
      { msg = "WORK", p = 0.20 }
    ]
    perNodePdf = []
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 200 }
    ]
    inputs = [
      { node = 1 }
    ]
  }
}
