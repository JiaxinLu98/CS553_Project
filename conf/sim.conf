include "application"

netgamesim {
  topology = "random"
  numNodes = 12
  edgeProbability = 0.25
  seed = 20260413
}

sim {
  algorithm = "both"
  runDurationMs = 12000

  messages {
    types = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }

  edgeLabeling {
    default = ["CONTROL", "PING", "WORK"]
    overrides = [
      { from = 0, to = 1, allow = ["WORK", "PING"] }
    ]
  }

  traffic {
    defaultPdf = [
      { msg = "PING", p = 0.40 },
      { msg = "GOSSIP", p = 0.20 },
      { msg = "WORK", p = 0.40 }
    ]
    perNodePdf = [
      { node = 0, pdf = [{ msg = "WORK", p = 0.70 }, { msg = "PING", p = 0.30 }] }
    ]
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 150, mode = "fixed", fixedMsg = "WORK" },
      { node = 3, tickEveryMs = 250, mode = "pdf" }
    ]
    inputs = [
      { node = 1 },
      { node = 7 }
    ]
  }
}
