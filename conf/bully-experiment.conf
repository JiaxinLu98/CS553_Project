include "application"

netgamesim {
  topology = "complete"
  numNodes = 8
  edgeProbability = 1.0
  seed = 20260413
}

sim {
  algorithm = "bully"
  runDurationMs = 8000

  messages {
    types = ["CONTROL", "PING", "WORK", "ACK"]
  }

  edgeLabeling {
    default = ["CONTROL", "PING", "WORK", "ACK"]
    overrides = []
  }

  traffic {
    defaultPdf = [
      { msg = "PING", p = 0.60 },
      { msg = "WORK", p = 0.40 }
    ]
    perNodePdf = [
      { node = 0, pdf = [{ msg = "WORK", p = 0.80 }, { msg = "PING", p = 0.20 }] }
    ]
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 250, mode = "fixed", fixedMsg = "WORK" }
    ]
    inputs = [
      { node = 1 }
    ]
  }
}
